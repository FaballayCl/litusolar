<html lang="es">
<body>
    <main class="container page-content">
        <h1>Contacta con lituSolar</h1>
        <p>Déjanos tus datos y nos pondremos en contacto contigo lo antes posible para una asesoría personalizada.</p>
        
        <div class="contacto-wrapper card-style">
            <div id="success-message" class="alert-success"></div>

            <form id="contact-form">
                <div class="form-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" required>
                    <span id="name-error" class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                    <span id="email-error" class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label for="message">Mensaje</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                    <span id="message-error" class="error-msg"></span>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Enviar Mensaje</button>
            </form>
        </div>
    </main>

    </body>
</html>
