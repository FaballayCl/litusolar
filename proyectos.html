<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Editor Final Syncore</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f5; padding: 20px; display: flex; gap: 20px; height: 100vh; box-sizing: border-box; }
        
        /* BARRA LATERAL */
        .sidebar { 
            background: #fff; padding: 20px; width: 340px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-y: auto; 
            display: flex; flex-direction: column; gap: 15px;
        }
        
        h3 { font-size: 13px; text-transform: uppercase; color: #EF5B2A; border-bottom: 2px solid #0E2B5C; padding-bottom: 5px; margin: 0 0 10px 0; font-weight: 800; }

        .control-group { margin-bottom: 8px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        .control-group:last-child { border: none; }
        
        label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 4px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #0E2B5C; height: 5px; }
        
        .btn-copy { 
            padding: 15px; background: #0E2B5C; color: white; border: none; border-radius: 8px; 
            cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; margin-top: auto;
        }
        .btn-copy:hover { background: #EF5B2A; }

        /* VISTA PREVIA */
        .preview-area { 
            flex-grow: 1; background: #fff; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            display: flex; justify-content: center; align-items: center; overflow: auto;
        }
        
        .val { color: #0E2B5C; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <h3>1. Tamaño de Texto</h3>
            <div class="control-group">
                <label>Nombre: <span id="dispName" class="val">10pt</span></label>
                <input type="range" id="rangeName" min="8" max="18" step="0.5" value="10" oninput="update()">
            </div>
            <div class="control-group">
                <label>Cargo: <span id="dispTitle" class="val">10pt</span></label>
                <input type="range" id="rangeTitle" min="7" max="16" step="0.5" value="10" oninput="update()">
            </div>
            <div class="control-group">
                <label>Datos Contacto: <span id="dispInfo" class="val">7pt</span></label>
                <input type="range" id="rangeInfo" min="5" max="12" step="0.5" value="7" oninput="update()">
            </div>
        </div>

        <div>
            <h3>2. Espacios Verticales (Separación)</h3>
            <div class="control-group">
                <label>Nombre ↔ Cargo: <span id="dispMarName" class="val">4px</span></label>
                <input type="range" id="rangeMarName" min="0" max="20" value="4" oninput="update()">
            </div>
            <div class="control-group">
                <label>Cargo ↔ Barra: <span id="dispMarTitle" class="val">4px</span></label>
                <input type="range" id="rangeMarTitle" min="0" max="20" value="4" oninput="update()">
            </div>
            <div class="control-group">
                <label>Barras ↔ Teléfonos: <span id="dispMarBars" class="val">4px</span></label>
                <input type="range" id="rangeMarBars" min="0" max="15" value="4" oninput="update()">
            </div>
        </div>

        <div>
            <h3>3. Espaciado Letras</h3>
            <div class="control-group">
                <label>Tracking Nombre: <span id="dispSpaceName" class="val">0px</span></label>
                <input type="range" id="rangeSpaceName" min="0" max="5" step="0.5" value="0" oninput="update()">
            </div>
            <div class="control-group">
                <label>Tracking Cargo: <span id="dispSpaceTitle" class="val">0px</span></label>
                <input type="range" id="rangeSpaceTitle" min="0" max="5" step="0.5" value="0" oninput="update()">
            </div>
        </div>

        <div>
            <h3>4. Barras Naranjas</h3>
            <div class="control-group">
                <label>Grosor: <span id="dispBarH" class="val">3px</span></label>
                <input type="range" id="rangeBarH" min="1" max="10" value="3" oninput="update()">
            </div>
            <div class="control-group">
                <label>Largo: <span id="dispBarW" class="val">22px</span></label>
                <input type="range" id="rangeBarW" min="10" max="100" value="22" oninput="update()">
            </div>
        </div>

        <button class="btn-copy" onclick="copyHTML()">COPIAR CÓDIGO FINAL</button>
    </div>

    <div class="preview-area">
        <div id="signature-container">
            
            <table id="mainTable" role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse; font-family: 'Proxima Nova', Verdana, sans-serif; width: 650px; background-color: #ffffff;">
                <tbody><tr>
                    <td style="padding: 0px;">
                        <table width="100%" style="border-collapse: collapse;" cellpadding="0" cellspacing="0" border="0">
                            <tbody><tr>
                                <td width="415" valign="middle" style="width: 415px; vertical-align: middle; padding: 0; line-height: 0;">
                                    <img src="https://syncore.cl/Nueva-Firma/log.png" width="415" alt="Syncore" style="display: block; width: 100%; height: auto; border: 0;">
                                </td>

                                <td valign="middle" style="vertical-align: middle; padding-left: 18px;">
                                    
                                    <div id="editName" style="font-size: 10pt; color: #0E2B5C; font-weight: 700; text-transform: uppercase; margin-bottom: 4px;">
                                        FELIPE ABALLAY ASTUDILLO
                                    </div>
                                    
                                    <div id="editTitle" style="font-size: 10pt; color: #EF5B2A; font-weight: 700; text-transform: uppercase; margin-bottom: 4px;">
                                        LIDER DE SOPORTE TI
                                    </div>

                                    <div class="bar-container" style="margin-bottom: 4px; line-height: 0; font-size: 0;">
                                         <table class="orange-bar-table" width="22" border="0" cellpadding="0" cellspacing="0" style="width: 22px; background-color: #EF5B2A; border-collapse: collapse;">
                                            <tbody><tr><td class="orange-bar-td" height="3" style="height: 3px; line-height: 3px; font-size: 1px;">&nbsp;</td></tr></tbody>
                                         </table>
                                    </div>

                                    <div id="editPhone" style="font-size: 7pt; color: #0E2B5C; line-height: 1.4; margin-bottom: 4px;">
                                        <span style="font-weight: 700;">Tel.</span> +562 2471 1000<br>
                                        <span style="font-weight: 700;">Cel.</span> +56 9 9821 2641
                                    </div>

                                    <div class="bar-container" style="margin-bottom: 4px; line-height: 0; font-size: 0;">
                                         <table class="orange-bar-table" width="22" border="0" cellpadding="0" cellspacing="0" style="width: 22px; background-color: #EF5B2A; border-collapse: collapse;">
                                            <tbody><tr><td class="orange-bar-td" height="3" style="height: 3px; line-height: 3px; font-size: 1px;">&nbsp;</td></tr></tbody>
                                         </table>
                                    </div>

                                    <div id="editAddr" style="font-size: 7pt; color: #0E2B5C;">
                                        Av. Del Parque 4160 Torre B, Piso 6, Huechuraba
                                    </div>
                                </td>
                            </tr>
                        </tbody></table>
                    </td>
                </tr>
            </tbody></table>

        </div>
    </div>

    <script>
        function update() {
            // -- OBTENER VALORES --
            // Texto
            const sName = document.getElementById('rangeName').value;
            const sTitle = document.getElementById('rangeTitle').value;
            const sInfo = document.getElementById('rangeInfo').value;
            // Márgenes
            const mName = document.getElementById('rangeMarName').value;
            const mTitle = document.getElementById('rangeMarTitle').value;
            const mBars = document.getElementById('rangeMarBars').value;
            // Tracking
            const spName = document.getElementById('rangeSpaceName').value;
            const spTitle = document.getElementById('rangeSpaceTitle').value;
            // Barras
            const bH = document.getElementById('rangeBarH').value;
            const bW = document.getElementById('rangeBarW').value;

            // -- ACTUALIZAR LABELS --
            document.getElementById('dispName').innerText = sName + 'pt';
            document.getElementById('dispTitle').innerText = sTitle + 'pt';
            document.getElementById('dispInfo').innerText = sInfo + 'pt';
            
            document.getElementById('dispMarName').innerText = mName + 'px';
            document.getElementById('dispMarTitle').innerText = mTitle + 'px';
            document.getElementById('dispMarBars').innerText = mBars + 'px';

            document.getElementById('dispSpaceName').innerText = spName + 'px';
            document.getElementById('dispSpaceTitle').innerText = spTitle + 'px';
            
            document.getElementById('dispBarH').innerText = bH + 'px';
            document.getElementById('dispBarW').innerText = bW + 'px';

            // -- APLICAR ESTILOS --
            // 1. Tamaños
            const nameEl = document.getElementById('editName');
            const titleEl = document.getElementById('editTitle');
            const phoneEl = document.getElementById('editPhone');
            const addrEl = document.getElementById('editAddr');

            nameEl.style.fontSize = sName + 'pt';
            titleEl.style.fontSize = sTitle + 'pt';
            phoneEl.style.fontSize = sInfo + 'pt';
            addrEl.style.fontSize = sInfo + 'pt';

            // 2. Márgenes (Espaciado Vertical)
            nameEl.style.marginBottom = mName + 'px'; // Nombre <-> Cargo
            titleEl.style.marginBottom = mTitle + 'px'; // Cargo <-> Barra
            
            const barContainers = document.querySelectorAll('.bar-container');
            barContainers.forEach(div => div.style.marginBottom = mBars + 'px'); // Barra <-> Teléfono
            
            phoneEl.style.marginBottom = mBars + 'px'; // Teléfono <-> Barra

            // 3. Tracking
            nameEl.style.letterSpacing = spName + 'px';
            titleEl.style.letterSpacing = spTitle + 'px';

            // 4. Barras
            const tables = document.querySelectorAll('.orange-bar-table');
            const cells = document.querySelectorAll('.orange-bar-td');

            tables.forEach(tbl => {
                tbl.style.width = bW + 'px';
                tbl.setAttribute('width', bW);
            });

            cells.forEach(td => {
                td.style.height = bH + 'px';
                td.style.lineHeight = bH + 'px';
                td.setAttribute('height', bH);
            });
        }

        function copyHTML() {
            let clone = document.getElementById('mainTable').cloneNode(true);
            let html = clone.outerHTML;

            html = html.replace(/id="[^"]*"/g, "");
            html = html.replace(/class="[^"]*"/g, "");

            html = html.replace('FELIPE ABALLAY ASTUDILLO', '{{ name.givenName }} {{ name.familyName }}');
            html = html.replace('LIDER DE SOPORTE TI', '{{ title }}');
            html = html.replace('+56 9 9821 2641', '{{ phone.mobile }}');

            navigator.clipboard.writeText(html);
            alert("¡Firma Copiada!\n\nSe incluyeron todos tus ajustes de márgenes, letras y barras.");
        }
    </script>
</body>
</html>
